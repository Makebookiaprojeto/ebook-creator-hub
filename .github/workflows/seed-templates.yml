name: Popular catálogo de templates (rodar 1 vez)

# Esse workflow NÃO roda sozinho. Você aciona ele manualmente, uma única vez,
# depois que o banco novo já existir (migrations aplicadas). Vá em:
# GitHub.com > seu repositório > aba "Actions" > "Popular catálogo de templates"
# > botão "Run workflow".
# Roda inteiramente nos servidores do GitHub, nada é instalado no seu PC.
on:
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install

      - name: 1. Buscar e subir imagens do Pexels
        run: bun run scripts/fetch-pexels-images.ts

      - name: 2. Criar os 20 templates base (variante 1)
        run: bun run scripts/apply-template-updates.ts

      - name: 3. Gerar variantes 2, 3 e 4 (sem IA)
        run: bun run scripts/seed-template-variants.ts
