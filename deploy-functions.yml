name: Deploy Supabase Edge Functions

# Roda automaticamente sempre que você (ou eu) enviar uma alteração para a
# branch "main" no GitHub, OU quando você clicar manualmente em "Run workflow"
# na aba Actions do repositório. Roda inteiramente nos servidores do GitHub —
# não precisa de nada instalado no seu computador.
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
